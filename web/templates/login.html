<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Santos — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">🏨</div>

    <h4 class="text-center fw-bold mb-1">Hotel Santos</h4>
    <p class="text-center text-muted mb-4" style="font-size:0.875rem">Portal de Gestão</p>

    {% for f in flashes %}
    <div class="alert alert-{{ f.cat }} py-2 mb-3" style="font-size:0.85rem; border-radius:8px">
      <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ f.msg }}
    </div>
    {% endfor %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text" style="border-color:#e2e8f0; background:#f8fafc">
            <i class="bi bi-person" style="color:#94a3b8"></i>
          </span>
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário"
                 autofocus autocomplete="username" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text" style="border-color:#e2e8f0; background:#f8fafc">
            <i class="bi bi-lock" style="color:#94a3b8"></i>
          </span>
          <input type="password" name="password" class="form-control" placeholder="Digite sua senha"
                 autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:0.75rem">
      Hotel Santos &copy; 2025
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
