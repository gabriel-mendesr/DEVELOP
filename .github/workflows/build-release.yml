name: Build & Release - Hotel Santos

on:
  push:
    tags:
      - 'v*'  # Dispara quando cria tag v1.0.0, v1.0.1, etc

permissions:
  contents: write

env:
  GIT_TIMEOUT: 300
  GIT_COMPRESSION: 0
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
            tipo_build: windows
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Ubuntu
            tipo_build: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r app/requirements.txt
        timeout-minutes: 15

      - name: Build executable
        run: |
          cd app
          pyinstaller --name="SistemaHotelSantos" \
            --onefile \
            --windowed \
            --clean \
            --noconfirm \
            --add-data ".:." \
            app_gui.py
        shell: bash
        timeout-minutes: 30

      - name: Rename and verify executable (Windows)
        if: runner.os == 'Windows'
        run: |
          cd app\dist
          ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
          dir
        shell: cmd

      - name: Rename and verify executable (Linux)
        if: runner.os == 'Linux'
        run: |
          cd app/dist
          mv SistemaHotelSantos SistemaHotelSantos-Ubuntu
          chmod +x SistemaHotelSantos-Ubuntu
          ls -lah
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: app/dist/${{ matrix.nome_saida }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Display structure
        run: |
          echo "📦 Estrutura de artifacts:"
          find release_artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/**/SistemaHotelSantos*
          body: |
            # 🚀 Release ${{ github.ref_name }}
            
            ## 📥 Downloads Disponíveis
            
            ### Windows
            - **SistemaHotelSantos-Windows.exe** - Executável direto (sem instalação)
            
            ### Linux / Ubuntu
            - **SistemaHotelSantos-Ubuntu** - Executável direto (sem instalação)
            
            ---
            
            ## 📝 Como Usar
            
            ### Windows
            1. Baixe: `SistemaHotelSantos-Windows.exe`
            2. Execute (duplo clique ou cmd)
            3. Pronto! 🎉
            
            ### Linux / Ubuntu
            1. Baixe: `SistemaHotelSantos-Ubuntu`
            2. Dê permissão: `chmod +x SistemaHotelSantos-Ubuntu`
            3. Execute: `./SistemaHotelSantos-Ubuntu`
            4. Pronto! 🎉
            
            ---
            
            ## 🔄 Atualização Automática
            
            A aplicação detectará automaticamente essa nova versão (${{ github.ref_name }})
            e oferecerá atualização quando for aberta.
            
            ---
            
            **Build Date:** ${{ github.event.head_commit.timestamp }}  
            **Commit:** ${{ github.event.head_commit.id }}
          draft: false
          prerelease: false

      - name: Cleanup old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'completed',
              per_page: 100
            });

            const toDelete = workflow_runs.slice(10);
            
            for (const run of toDelete) {
              console.log(`🗑️  Deletando workflow run #${run.id}`);
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
            }
            
            console.log(`✅ ${toDelete.length} workflow runs deletadas`);
