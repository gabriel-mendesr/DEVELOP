name: Build & Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller && pip install -r app/requirements.txt
      - run: cd app && pyinstaller --onefile --windowed --noconfirm app_gui.py
      - if: runner.os == 'Windows'
        run: |
          cd app/dist
          ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
          dir
      - if: runner.os == 'Linux'
        run: |
          cd app/dist
          ls -la
          find . -type f -executable
          chmod +x SistemaHotelSantos
          mv SistemaHotelSantos SistemaHotelSantos-Ubuntu
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: app/dist/*
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/build-*/*
