name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            output: SistemaHotelSantos-Ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller && pip install -r app/requirements.txt
      - run: cd app && pyinstaller --onefile --windowed --noconfirm app_gui.py
      - if: runner.os == 'Windows'
        run: cd app\dist && ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
      - if: runner.os == 'Linux'
        run: cd app/dist && mv SistemaHotelSantos SistemaHotelSantos-Ubuntu && chmod +x SistemaHotelSantos-Ubuntu
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: app/dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/SistemaHotelSantos*
          body: Release ${{ github.ref_name }}
